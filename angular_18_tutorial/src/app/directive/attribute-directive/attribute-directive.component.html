<div class="bg-secondary">
    <span class="bg-primary text-white m-4 ">ngClass</span>
<span class="bg-success text-white">ngStyle</span>

</div>



<div class="container mt-4">
  <div class="row g-3">

    <div class="col-md-3 col-sm-6" >
      <div  class="card text-center p-3 text-dark" [ngClass]="div1Color">
        Div 1
      </div>
      <div  class="p-2">
        <button class="btn btn-success me-2" (click)="successClass()">Apply Done</button>
        <button class="btn btn-danger" (click)="dangerClass()">Apply Pending</button></div>
    </div>

      

    <div class="col-md-3 col-sm-6">
      <div class="card text-dark text-center p-3" [ngClass]="isDiv2Active?'bg-warning':'bg-danger'" >
       Div 2
      </div>
      <div  class="p-2">
        <button class="btn btn-success me-2" (click)="toggleDiv2()">Toggle</button>
        
    </div>
    </div>

    <div class="col-md-3 col-sm-6">
      <div class="card text-dark text-center p-3"  [ngClass]="num1==num2 ? 'bg-primary text-white':'bg-success text-dark'">
        Div 3
      </div>
      <div  class="p-2">
        <input [(ngModel)]="num1" placeholder="enter value 1" type="text">
        <input [(ngModel)]="num2" placeholder="enter value 2" type="text">
    </div>

      
    </div>

    <div class="col-md-3 col-sm-6">
      <div class="card text-dark text-center p-3" [ngClass]="isChecked ? 'bg-primary' : 'bg-secondary'" >
        Div 4
      </div>
      <div  class="p-2">
        <input type="checkbox" [(ngModel)]="isChecked" >

            <option value="XYZ">XYZ</option>

         </select> -->
    </div>

    </div>

    <table class="table table-bordered">
  <thead>
    <tr>
      <th scope="col">ID</th>
      <th scope="col">First</th>
      <th scope="col">Last</th>
      <th scope="col">Gender</th>
      <th scope="col">Status</th>
      <th scope="col">Marks</th>
      

    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let item of employeeList" >
      <td>{{item.id}}</td>
      <td>{{item.name}}</td>
      <td>{{item.lastname}}</td>
      <td>{{item.gender}}</td>
      <td>{{item.status}}</td>
      <td>
        <div class="progress">
  <div class="progress-bar" role="progressbar" aria-valuenow="70"
  aria-valuemin="0" aria-valuemax="100" [ngStyle]="{'width':item.totalMarks+'%', 'background-color':item.gender=='male'?'blue':'green'}">
    {{item.totalMarks}}
  </div>
</div>
      </td>
      
    </tr>
    
  </tbody>
</table>
